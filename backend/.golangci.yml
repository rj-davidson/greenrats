version: "2"

run:
  timeout: 5m
  go: "1.25"

linters:
  default: none
  enable:
    - errcheck # Check for unchecked errors
    - govet # Suspicious constructs
    - ineffassign # Unused assignments
    - staticcheck # Static analysis (includes gosimple)
    - unused # Unused code
    - gocritic # Opinionated linter
    - errname # Error naming conventions
    - errorlint # Error wrapping
    - gosec

  settings:
    errcheck:
      check-type-assertions: true
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # Package comments

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
          - gosec
      - path: ent/
        linters:
          - errcheck
          - gocritic
          - govet
      - path: tools\.go
        linters:
          - unused
    max-issues-per-linter: 0
    max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/rj-davidson/greenrats
