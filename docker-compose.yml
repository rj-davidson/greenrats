services:
  postgres:
    image: postgres:16-alpine
    container_name: greenrats-postgres
    environment:
      POSTGRES_USER: greenrats
      POSTGRES_PASSWORD: greenrats
      POSTGRES_DB: greenrats
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenrats -d greenrats"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
